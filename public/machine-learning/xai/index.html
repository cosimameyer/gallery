      <a class="gallery-item" href="/machine-learning/xai/explainable_ai.png" data-pswp-src="/machine-learning/xai/explainable_ai_hu_e849511ea60e938c.png" data-pswp-width="1600" data-pswp-height="1200" data-pswp-target="explainable_ai.png" title="The visualization of six different model agnostic approaches to explain machine learning models post-hoc such as&lt;br&gt;&lt;br&gt;- Feature importance is based on the idea of permutation where you shuffle the values of a feature. If this change increases the model error, the feature is perceived to be important.&lt;br&gt;- Shapley values are based on a game theoretical approach that calculates the average of *all* marginal contributions to *all* possible outcomes.&lt;br&gt;- LIME plots tell you locally around a data point what the most important feature is. While they may look similar to SHAP, they are only an approximation (calculated on a small set of features and do not provide a guarantee of accuracy and consistency.&lt;br&gt;- ICE plots show the individual conditional expectation where all other features are kept the same and the effects for one feature are calculated.&lt;br&gt;-  Partial dependency plots visualize the *average* output of the model for each target feature value for the entire dataset.&lt;br&gt;- Breakdown plots show the contribution of every variable to the final prediction." itemscope itemtype="https://schema.org/ImageObject" style="aspect-ratio: 600 / 450">
